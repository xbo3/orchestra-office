<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>WOO ORCHESTRA OFFICE 3D</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:#0a0c10;color:#e8eaf0;overflow:hidden}
.mono{font-family:'JetBrains Mono',monospace}
#app{display:grid;grid-template-columns:1fr 280px;grid-template-rows:48px 1fr;height:100vh}
.topbar{grid-column:1/3;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:rgba(15,17,24,.95);border-bottom:1px solid #1e2338;backdrop-filter:blur(10px);z-index:10}
.topbar-l{display:flex;align-items:center;gap:10px}
.logo{width:28px;height:28px;background:linear-gradient(135deg,#6c5ce7,#a29bfe);border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;color:#fff}
.topbar h1{font-size:14px;font-weight:700;background:linear-gradient(135deg,#e8eaf0,#a29bfe);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tag{font-size:9px;padding:2px 7px;background:#1a1d2e;border-radius:8px;color:#7882a4}
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;font-size:10px;font-weight:600;background:rgba(16,185,129,.08);color:#34d399}
.pill .dot{width:5px;height:5px;border-radius:50%;background:currentColor;animation:p 2s infinite}
@keyframes p{50%{opacity:.2}}
#canvas-wrap{position:relative;overflow:hidden}
#cv{display:block;width:100%;height:100%}
#overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(10,12,16,.9));padding:16px;z-index:5}
.stats{display:flex;gap:10px;margin-bottom:10px}
.st{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:8px 10px}
.st .sl{font-size:8px;color:#5a6178;text-transform:uppercase;letter-spacing:.5px}
.st .sv{font-size:16px;font-weight:700;margin-top:2px;font-family:'JetBrains Mono',monospace}
.cmd{display:flex;gap:6px}
.cmd select{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:6px;padding:6px 8px;font-size:10px;color:#e8eaf0;font-family:'Outfit',sans-serif;outline:none}
.cmd input{flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:6px;padding:6px 10px;font-size:11px;color:#e8eaf0;font-family:'Outfit',sans-serif;outline:none}
.cmd input:focus{border-color:#6c5ce7}
.cmd button{background:linear-gradient(135deg,#6c5ce7,#8578f0);color:#fff;border:none;border-radius:6px;padding:6px 16px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif}
.wfb{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px;min-height:20px}
.wfc{padding:3px 8px;border-radius:5px;font-size:9px;font-weight:600;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04)}
.wfc.done{background:rgba(52,211,153,.1);border-color:rgba(52,211,153,.3);color:#34d399}
.wfc.now{background:rgba(108,92,231,.1);border-color:rgba(108,92,231,.3);color:#a29bfe;box-shadow:0 0 8px rgba(108,92,231,.2)}
.wfc.wait{opacity:.2}
.wa{color:#4a5168;font-size:10px;line-height:20px}
.sidebar{background:rgba(15,17,24,.95);border-left:1px solid #1e2338;display:flex;flex-direction:column;overflow:hidden}
.side-sec{padding:12px;border-bottom:1px solid #1e2338}
.side-t{font-size:10px;font-weight:600;color:#5a6178;text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.agent-row{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:8px;margin-bottom:3px;cursor:pointer;transition:background .15s}
.agent-row:hover{background:rgba(255,255,255,.04)}
.agent-row.active{background:rgba(108,92,231,.1)}
.agent-row .av{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.agent-row .nm{font-size:11px;font-weight:500;flex:1}
.agent-row .st-dot{width:6px;height:6px;border-radius:50%}
.agent-row .st-dot.on{background:#34d399;box-shadow:0 0 6px rgba(52,211,153,.5)}
.agent-row .st-dot.off{background:#333}
.log-wrap{flex:1;overflow-y:auto;padding:8px}
.log{display:flex;gap:4px;padding:4px;font-size:9px;margin-bottom:1px}
.log .lt{font-family:'JetBrains Mono',monospace;color:#4a5168;min-width:30px}
.log .lb{font-weight:700;padding:0 4px;border-radius:3px;white-space:nowrap}
.log .lm{color:#7882a4;flex:1}
.pr{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:6px;background:rgba(255,255,255,.03);margin-bottom:3px;font-size:10px}
.pr .n{flex:1;font-weight:500}
.pr .b{font-size:8px;padding:1px 5px;border-radius:6px;font-weight:600}
.pr .b.live{background:rgba(52,211,153,.1);color:#34d399}
.pr .b.dev{background:rgba(251,191,36,.1);color:#fbbf24}
.pr .b.plan{background:rgba(96,165,250,.1);color:#60a5fa}
#info-panel{padding:12px}
#info-panel .det{font-size:10px;color:#7882a4;line-height:1.5}
</style>
</head>
<body>
<div id="app">
<div class="topbar">
<div class="topbar-l"><div class="logo">W</div><h1>WOO ORCHESTRA OFFICE</h1><span class="tag">3D</span></div>
<div style="display:flex;align-items:center;gap:10px"><span class="pill"><span class="dot"></span>Online</span><span class="mono" style="font-size:10px;color:#5a6178" id="clock">00:00</span></div>
</div>
<div id="canvas-wrap">
<canvas id="cv"></canvas>
<div id="overlay">
<div class="stats">
<div class="st"><div class="sl">Agents</div><div class="sv" id="sa">0<span style="font-size:9px;color:#4a5168">/7</span></div></div>
<div class="st"><div class="sl">Tasks</div><div class="sv" id="stk">0</div></div>
<div class="st"><div class="sl">Project</div><div class="sv" style="font-size:12px" id="sp">standby</div></div>
<div class="st"><div class="sl">Uptime</div><div class="sv mono" id="su">00:00</div></div>
</div>
<div class="cmd">
<select id="sel"><option value="auto">auto</option><option value="drslot">DR.SLOT</option><option value="jarvis2">JARVIS2</option><option value="community">Community</option></select>
<input id="inp" placeholder="What should we build?" onkeydown="if(event.key==='Enter')go()">
<button onclick="go()">Execute</button>
</div>
<div class="wfb" id="wfb"></div>
</div>
</div>
<div class="sidebar">
<div class="side-sec">
<div class="side-t">Agents</div>
<div id="agent-list"></div>
</div>
<div class="side-sec">
<div class="side-t">Projects</div>
<div class="pr"><span class="n">DR.SLOT</span><span class="b dev">dev</span></div>
<div class="pr"><span class="n">JARVIS2</span><span class="b live">live</span></div>
<div class="pr"><span class="n">Community</span><span class="b plan">plan</span></div>
</div>
<div class="side-sec" id="info-panel">
<div class="side-t">Agent detail</div>
<div class="det" id="det">Click an agent</div>
</div>
<div class="side-sec" style="padding:0;flex:1;display:flex;flex-direction:column">
<div class="side-t" style="padding:8px 12px 4px">Activity log</div>
<div class="log-wrap" id="logs"></div>
</div>
</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const AG=[
{id:'ceo',nm:'CEO',role:'Orchestrator',color:0x6c5ce7,hex:'#6c5ce7',pos:[0,0,-3],rot:Math.PI,skin:0xEDCBAB,hair:0x1C1410,shirt:0x5548B5,pants:0x2C2255,det:'Decomposes tasks, assigns agents, tracks progress, quality control.',state:'idle',bubble:''},
{id:'fe',nm:'Frontend',role:'React/Next.js',color:0x14b8a6,hex:'#14b8a6',pos:[-3,0,0],rot:Math.PI/2,skin:0xD4A574,hair:0x5C3317,shirt:0x14b8a6,pants:0x0D5C54,det:'UI, React, Tailwind CSS, mobile responsive, animations.',state:'idle',bubble:''},
{id:'be',nm:'Backend',role:'API/Database',color:0x3b82f6,hex:'#3b82f6',pos:[-3,0,2],rot:Math.PI/2,skin:0xEDCBAB,hair:0x1C1410,shirt:0x2563EB,pants:0x1E3A5F,det:'Express, FastAPI, Prisma, PostgreSQL, JWT auth.',state:'idle',bubble:''},
{id:'pe',nm:'Prompt',role:'JARVIS2 AI',color:0xec4899,hex:'#ec4899',pos:[3,0,0],rot:-Math.PI/2,skin:0xE8C4A0,hair:0x2C1A1A,shirt:0xDB2777,pants:0x6B1D4A,det:'9-section prompts, thawing logic, vibe tuning.',state:'idle',bubble:''},
{id:'ds',nm:'Design',role:'UI/UX',color:0xf59e0b,hex:'#f59e0b',pos:[3,0,2],rot:-Math.PI/2,skin:0xEDCBAB,hair:0xC8922A,shirt:0xD97706,pants:0x7C4A05,det:'Wireframes, color systems, prototyping, mobile-first.',state:'idle',bubble:''},
{id:'qa',nm:'QA',role:'Tester',color:0x10b981,hex:'#10b981',pos:[-3,0,5],rot:Math.PI/2,skin:0xC49A6C,hair:0x1A0E08,shirt:0x059669,pants:0x065F42,det:'Code review, syntax check, API tests, edge cases.',state:'idle',bubble:''},
{id:'dv',nm:'DevOps',role:'Deploy',color:0x64748b,hex:'#64748b',pos:[3,0,5],rot:-Math.PI/2,skin:0xD4A574,hair:0x111111,shirt:0x475569,pants:0x334155,det:'Railway, Vercel, git, env vars, health checks.',state:'idle',bubble:''}
];

let scene,camera,renderer,frame=0,tasksDone=0,running=false,startT=Date.now();
const meshes={},mixers=[];

function init(){
const wrap=document.getElementById('canvas-wrap');
const W=wrap.clientWidth,H=wrap.clientHeight;

scene=new THREE.Scene();
scene.background=new THREE.Color(0xE8ECF2);
scene.fog=new THREE.Fog(0xE8ECF2,20,40);

camera=new THREE.PerspectiveCamera(35,W/H,0.1,100);
camera.position.set(0,14,16);
camera.lookAt(0,0,1);

renderer=new THREE.WebGLRenderer({canvas:document.getElementById('cv'),antialias:true});
renderer.setSize(W,H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;

const amb=new THREE.AmbientLight(0xffffff,.55);scene.add(amb);
const dir=new THREE.DirectionalLight(0xffffff,.7);
dir.position.set(5,10,5);dir.castShadow=true;
dir.shadow.mapSize.set(1024,1024);
dir.shadow.camera.near=1;dir.shadow.camera.far=30;
dir.shadow.camera.left=-10;dir.shadow.camera.right=10;
dir.shadow.camera.top=10;dir.shadow.camera.bottom=-10;
scene.add(dir);

const fill=new THREE.DirectionalLight(0xB0D4F1,.3);
fill.position.set(-5,8,-3);scene.add(fill);

const hemi=new THREE.HemisphereLight(0x87CEEB,0xD8DDE8,.3);scene.add(hemi);

buildRoom();
AG.forEach(a=>buildAgent(a));
buildFurniture();
buildAgentList();

window.addEventListener('resize',()=>{
const w=wrap.clientWidth,h=wrap.clientHeight;
camera.aspect=w/h;camera.updateProjectionMatrix();
renderer.setSize(w,h);
});

animate();
}

function mat(c,opts){
return new THREE.MeshLambertMaterial({color:c,...(opts||{})});
}

function box(w,h,d,c,opts){
const g=new THREE.BoxGeometry(w,h,d);
const m=new THREE.Mesh(g,mat(c,opts));
m.castShadow=true;m.receiveShadow=true;
return m;
}

function cyl(rt,rb,h,c,seg){
const g=new THREE.CylinderGeometry(rt,rb,h,seg||16);
const m=new THREE.Mesh(g,mat(c));
m.castShadow=true;
return m;
}

function buildRoom(){
const floor=box(20,.1,16,0xD0C8BC);
floor.position.set(0,-.05,2);floor.receiveShadow=true;
scene.add(floor);

const tileG=new THREE.PlaneGeometry(20,16);
const tileMat=new THREE.MeshLambertMaterial({color:0xC8C0B4});
const tiles=new THREE.Mesh(tileG,tileMat);
tiles.rotation.x=-Math.PI/2;tiles.position.set(0,0.01,2);
tiles.receiveShadow=true;scene.add(tiles);

const wallBack=box(20,5,.15,0xF0ECE4);
wallBack.position.set(0,2.5,-5);scene.add(wallBack);

const wallL=box(.15,5,16,0xEDE8E0);
wallL.position.set(-10,2.5,2);scene.add(wallL);

const wallR=box(.15,5,16,0xEDE8E0);
wallR.position.set(10,2.5,2);scene.add(wallR);

for(let i=0;i<3;i++){
const wf=box(2.2,2.5,.05,0xB8D4E8);
wf.position.set(-5+i*5,2.8,-4.9);scene.add(wf);
const frame=box(2.4,2.7,.08,0xC8C0B4);
frame.position.set(-5+i*5,2.8,-4.88);scene.add(frame);
const cross1=box(.06,2.5,.08,0xC8C0B4);
cross1.position.set(-5+i*5,2.8,-4.86);scene.add(cross1);
const cross2=box(2.2,.06,.08,0xC8C0B4);
cross2.position.set(-5+i*5,2.8,-4.86);scene.add(cross2);
}

const sill=box(20,.08,.3,0xD8D0C4);
sill.position.set(0,1.45,-4.85);scene.add(sill);

const molding=box(20,.12,.12,0xD0C8BC);
molding.position.set(0,.06,-4.93);scene.add(molding);

for(let i=0;i<4;i++){
const lBase=box(1.2,.04,.3,0xE0E0E0);
lBase.position.set(-4.5+i*3,4.95,1+i*.5);scene.add(lBase);
const lTube=box(.8,.03,.15,0xFFFDE0);
lTube.position.set(-4.5+i*3,4.92,1+i*.5);scene.add(lTube);
const glow=new THREE.PointLight(0xFFFAE0,.15,6);
glow.position.set(-4.5+i*3,4.8,1+i*.5);scene.add(glow);
}

const ceil=box(20,.1,16,0xF4F0E8);
ceil.position.set(0,5,2);scene.add(ceil);
}

function buildDesk(x,z,rotY){
const g=new THREE.Group();

const top=box(1.8,.06,0.9,0xC8A870);
top.position.y=.75;g.add(top);

const edge=box(1.82,.02,.92,0xDBB888);
edge.position.y=.78;g.add(edge);

const legFL=box(.05,.75,.05,0x8A6A38);legFL.position.set(-.85,.375,.4);g.add(legFL);
const legFR=box(.05,.75,.05,0x8A6A38);legFR.position.set(.85,.375,.4);g.add(legFR);
const legBL=box(.05,.75,.05,0x8A6A38);legBL.position.set(-.85,.375,-.4);g.add(legBL);
const legBR=box(.05,.75,.05,0x8A6A38);legBR.position.set(.85,.375,-.4);g.add(legBR);

const panel=box(1.7,.55,.04,0xB09860);
panel.position.set(0,.5,-.43);g.add(panel);

const shelf=box(1.6,.03,.35,0xA08850);
shelf.position.set(0,.4,-.25);g.add(shelf);

g.position.set(x,0,z);
g.rotation.y=rotY||0;
scene.add(g);
return g;
}

function buildMonitor(parent,lx,lz){
const g=new THREE.Group();
const stand=box(.04,.2,.04,0x555555);stand.position.set(0,.09,0);g.add(stand);
const base=box(.15,.02,.1,0x555555);base.position.set(0,0,0);g.add(base);
const screen=box(.5,.35,.03,0x1a1d2e);screen.position.set(0,.38,0);g.add(screen);
const display=box(.46,.31,.01,0x0F1F3A);display.position.set(0,.38,.02);
display.userData.isScreen=true;
g.add(display);
g.position.set(lx,.78,lz);
parent.add(g);
return display;
}

function buildChair(x,z,rotY,color){
const g=new THREE.Group();
const seat=cyl(.25,.25,.06,color||0x333333,12);
seat.position.y=.45;g.add(seat);
const back=box(.4,.45,.04,color||0x333333);
back.position.set(0,.72,-.12);g.add(back);
const pole=cyl(.03,.03,.15,0x888888);
pole.position.y=.35;g.add(pole);
const wheelBase=cyl(.02,.02,.3,0x666666);
wheelBase.position.y=.15;wheelBase.rotation.y=Math.PI/4;g.add(wheelBase);
const wb2=cyl(.02,.02,.3,0x666666);
wb2.position.y=.15;wb2.rotation.y=-Math.PI/4;g.add(wb2);
for(let i=0;i<4;i++){
const w=cyl(.03,.03,.03,0x444444);
const a=i*Math.PI/2+Math.PI/4;
w.position.set(Math.cos(a)*.15,.03,Math.sin(a)*.15);g.add(w);
}
g.position.set(x,0,z);g.rotation.y=rotY||0;
scene.add(g);
return g;
}

function buildPerson(ag){
const g=new THREE.Group();

const hips=new THREE.Group();hips.position.y=.5;g.add(hips);

const torso=box(.3,.35,.18,ag.shirt);
torso.position.y=.17;hips.add(torso);

const head=new THREE.Mesh(new THREE.SphereGeometry(.12,16,16),mat(ag.skin));
head.position.y=.5;head.castShadow=true;
hips.add(head);

const hairGeo=new THREE.SphereGeometry(.125,16,16);
const hairMesh=new THREE.Mesh(hairGeo,mat(ag.hair));
hairMesh.position.y=.53;hairMesh.scale.set(1,.6,1);
hips.add(hairMesh);

const eyeL=new THREE.Mesh(new THREE.SphereGeometry(.015,8,8),mat(0x111111));
eyeL.position.set(-.04,.5,.11);hips.add(eyeL);
const eyeR=new THREE.Mesh(new THREE.SphereGeometry(.015,8,8),mat(0x111111));
eyeR.position.set(.04,.5,.11);hips.add(eyeR);

const eyeShineL=new THREE.Mesh(new THREE.SphereGeometry(.006,6,6),mat(0xffffff));
eyeShineL.position.set(-.035,.505,.12);hips.add(eyeShineL);
const eyeShineR=new THREE.Mesh(new THREE.SphereGeometry(.006,6,6),mat(0xffffff));
eyeShineR.position.set(.045,.505,.12);hips.add(eyeShineR);

const smile=new THREE.Mesh(new THREE.TorusGeometry(.03,.006,8,12,Math.PI),mat(0xC08878));
smile.position.set(0,.44,.12);smile.rotation.x=Math.PI;
hips.add(smile);

const cheekL=new THREE.Mesh(new THREE.SphereGeometry(.025,8,8),mat(0xE8A0A0,{transparent:true,opacity:.2}));
cheekL.position.set(-.08,.46,.1);hips.add(cheekL);
const cheekR=new THREE.Mesh(new THREE.SphereGeometry(.025,8,8),mat(0xE8A0A0,{transparent:true,opacity:.2}));
cheekR.position.set(.08,.46,.1);hips.add(cheekR);

const armLGroup=new THREE.Group();armLGroup.position.set(-.18,.28,0);hips.add(armLGroup);
const upperArmL=box(.08,.2,.08,ag.shirt);upperArmL.position.y=-.1;armLGroup.add(upperArmL);
const forearmLG=new THREE.Group();forearmLG.position.set(0,-.2,0);armLGroup.add(forearmLG);
const forearmL=box(.06,.18,.06,ag.skin);forearmL.position.y=-.09;forearmLG.add(forearmL);
const handL=new THREE.Mesh(new THREE.SphereGeometry(.03,8,8),mat(ag.skin));
handL.position.y=-.18;forearmLG.add(handL);

const armRGroup=new THREE.Group();armRGroup.position.set(.18,.28,0);hips.add(armRGroup);
const upperArmR=box(.08,.2,.08,ag.shirt);upperArmR.position.y=-.1;armRGroup.add(upperArmR);
const forearmRG=new THREE.Group();forearmRG.position.set(0,-.2,0);armRGroup.add(forearmRG);
const forearmR=box(.06,.18,.06,ag.skin);forearmR.position.y=-.09;forearmRG.add(forearmR);
const handR=new THREE.Mesh(new THREE.SphereGeometry(.03,8,8),mat(ag.skin));
handR.position.y=-.18;forearmRG.add(handR);

const legL=box(.1,.3,.1,ag.pants);legL.position.set(-.08,-.15,.15);hips.add(legL);
const legR=box(.1,.3,.1,ag.pants);legR.position.set(.08,-.15,.15);hips.add(legR);

const shoeL=box(.08,.05,.14,0x222222);shoeL.position.set(-.08,-.32,.18);hips.add(shoeL);
const shoeR=box(.08,.05,.14,0x222222);shoeR.position.set(.08,-.32,.18);hips.add(shoeR);

g.position.set(ag.pos[0],ag.pos[1],ag.pos[2]);
g.rotation.y=ag.rot;
scene.add(g);

meshes[ag.id]={group:g,hips,head,armLGroup,forearmLG,armRGroup,forearmRG,smile};
return g;
}

function buildAgent(ag){
const dg=buildDesk(ag.pos[0],ag.pos[2],ag.rot+Math.PI);
const screen=buildMonitor(dg,0,-.15);
meshes[ag.id+'_screen']=screen;

const kbG=new THREE.Group();
const kb=box(.2,.01,.1,0xDDDDDD);kbG.add(kb);
for(let r=0;r<3;r++)for(let c=0;c<5;c++){
const key=box(.025,.008,.025,0xBBBBBB);
key.position.set(-.07+c*.035,.008,-.03+r*.03);kbG.add(key);
}
kbG.position.set(0,.79,.2);dg.add(kbG);

const mouse=cyl(.02,.015,.01,0xDDDDDD,8);
mouse.position.set(.35,.79,.2);dg.add(mouse);

if(ag.id==='ceo'||ag.id==='be'||ag.id==='ds'){
for(let i=0;i<4;i++){
const folder=box(.1,.18,.02,[0x4ade80,0x60a5fa,0xfbbf24,0xf87171][i]);
folder.position.set(-.65+i*.04,.88,-.2+i*.02);dg.add(folder);
}
}
if(ag.id==='fe'||ag.id==='pe'||ag.id==='qa'){
const cup=cyl(.03,.025,.06,0xFFF8F0);
cup.position.set(.6,.82,0);dg.add(cup);
const coffee=cyl(.025,.025,.01,0x5C3820);

function animateAgent(ag,t){
const m=meshes[ag.id];if(!m)return;
const{armLGroup,forearmLG,armRGroup,forearmRG,head,hips}=m;
const br=Math.sin(t*.8+AG.indexOf(ag))*.01;
hips.position.y=.5+br;

if(ag.state==='typing'){
armLGroup.rotation.x=-.6+Math.sin(t*5)*.15;
armRGroup.rotation.x=-.6+Math.sin(t*5+1.5)*.15;
forearmLG.rotation.x=-1.2+Math.sin(t*7)*.1;
forearmRG.rotation.x=-1.2+Math.sin(t*7+1)*.1;
head.rotation.y=Math.sin(t*.5)*.05;
const scr=meshes[ag.id+'_screen'];
if(scr)scr.material.color.setHex(0x1E3A6F);
}else if(ag.state==='thinking'){
armRGroup.rotation.x=-1.2;armRGroup.rotation.z=.3;
forearmRG.rotation.x=-1.5;
armLGroup.rotation.x=-.2;forearmLG.rotation.x=-.3;
head.rotation.z=Math.sin(t)*.08;head.rotation.x=-.1;
}else if(ag.state==='presenting'){
armRGroup.rotation.x=-2+Math.sin(t*2)*.2;
armRGroup.rotation.z=.2;forearmRG.rotation.x=-.3;
armLGroup.rotation.x=-.1;forearmLG.rotation.x=-.3;
head.rotation.y=Math.sin(t*1.5)*.1;
}else if(ag.state==='celebrating'){
armLGroup.rotation.x=-2.5+Math.sin(t*6)*.3;
armRGroup.rotation.x=-2.5+Math.sin(t*6+1)*.3;
forearmLG.rotation.x=-.2;forearmRG.rotation.x=-.2;
head.rotation.z=Math.sin(t*4)*.1;head.rotation.y=Math.sin(t*3)*.1;
}else{
armLGroup.rotation.x=-.2;armRGroup.rotation.x=-.2;
forearmLG.rotation.x=-.5;forearmRG.rotation.x=-.5;
armLGroup.rotation.z=0;armRGroup.rotation.z=0;
head.rotation.set(0,0,0);
const scr=meshes[ag.id+'_screen'];
if(scr)scr.material.color.setHex(0x0a0c14);
}

m.group.visible=true;
if(ag.state==='idle'){
const scr=meshes[ag.id+'_screen'];
if(scr)scr.material.color.setHex(0x0F1F3A);
}
}

}

async function go(){
if(running)return;running=true;
const text=document.getElementById('inp').value.trim()||'new feature';
document.getElementById('inp').value='';
let proj=document.getElementById('sel').value;
if(proj==='auto'){
if(text.match(/dr\.?slot|슬롯|게임|카지노|입금|출금|wallet|보너스/i))proj='drslot';
else if(text.match(/jarvis|자비스|텔레|프롬프트|crm|고객|영업/i))proj='jarvis2';
else if(text.match(/커뮤|community|비교|랭킹/i))proj='community';
else proj='drslot';
}
const names={drslot:'DR.SLOT',jarvis2:'JARVIS2',community:'Community'};
document.getElementById('sp').textContent=names[proj];
log('ceo','Boss: "'+text+'"');
const steps=SCEN[proj];let prev=null;
for(let i=0;i<steps.length;i++){
const s=steps[i];updateWF(steps,i);
if(prev&&prev!==s.a){const pa=AG.find(x=>x.id===prev);if(pa){pa.state='idle';pa.bubble='';updateAgentUI(pa)}}
const ag=AG.find(x=>x.id===s.a);if(ag){ag.state=s.s;ag.bubble=s.m;updateAgentUI(ag)}
const ac=AG.filter(a=>a.state!=='idle').length;
document.getElementById('sa').innerHTML=ac+'<span style="font-size:9px;color:#4a5168">/7</span>';
log(s.a,s.m);await new Promise(r=>setTimeout(r,s.d));prev=s.a;
}
tasksDone++;document.getElementById('stk').textContent=tasksDone;
updateWF(steps,steps.length);log('ceo','Task #'+tasksDone+' done!');
await new Promise(r=>setTimeout(r,2000));
AG.forEach(a=>{a.state='idle';a.bubble='';updateAgentUI(a)});
document.getElementById('wfb').innerHTML='';document.getElementById('sp').textContent='standby';
document.getElementById('sa').innerHTML='0<span style="font-size:9px;color:#4a5168">/7</span>';
running=false;
}

document.getElementById('su').textContent=String(Math.floor(e/60)).padStart(2,'0')+':'+String(e%60).padStart(2,'0');
},1000);
</script>
