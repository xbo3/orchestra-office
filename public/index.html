<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>WOO ORCHESTRA OFFICE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:system-ui,sans-serif;color:#fff}
#c{display:block}
#hud{position:fixed;bottom:0;left:0;right:0;z-index:10;padding:12px 16px;background:rgba(0,0,0,.6);backdrop-filter:blur(12px);border-top:1px solid rgba(255,255,255,.08)}
#top{position:fixed;top:0;left:0;right:0;z-index:10;padding:8px 16px;background:rgba(0,0,0,.5);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.06)}
#top h1{font-size:13px;font-weight:700}
.row{display:flex;gap:6px;margin-bottom:8px}
.st{flex:1;padding:6px 8px;background:rgba(255,255,255,.04);border-radius:6px}
.st small{font-size:8px;color:rgba(255,255,255,.3);text-transform:uppercase}
.st div{font-size:15px;font-weight:700;font-family:monospace}
.cmd{display:flex;gap:6px}
.cmd input{flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:6px;padding:6px 10px;color:#fff;font-size:11px;outline:none}
.cmd button{background:#6c5ce7;color:#fff;border:none;border-radius:6px;padding:6px 16px;font-size:11px;font-weight:600;cursor:pointer}
.wf{display:flex;gap:4px;flex-wrap:wrap;min-height:18px;margin-top:6px}
.wf span{padding:2px 8px;border-radius:4px;font-size:9px;font-weight:600}
.wf .done{background:rgba(52,211,153,.15);color:#34d399}
.wf .now{background:rgba(108,92,231,.2);color:#a29bfe}
.wf .wait{opacity:.15;background:rgba(255,255,255,.04);color:#888}
.wf .ar{color:#444;font-size:10px}
.agents{display:flex;gap:4px;flex-wrap:wrap}
.agents span{font-size:9px;padding:2px 8px;border-radius:10px;font-weight:600;background:rgba(255,255,255,.04);cursor:pointer}
.agents span.on{background:rgba(108,92,231,.15)}
#log{font-size:9px;color:rgba(255,255,255,.35);margin-top:4px;max-height:30px;overflow:hidden}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="top">
<h1>WOO ORCHESTRA OFFICE</h1>
<div class="agents" id="ags"></div>
</div>
<div id="hud">
<div class="row">
<div class="st"><small>Agents</small><div id="sa">0/7</div></div>
<div class="st"><small>Tasks</small><div id="stk">0</div></div>
<div class="st"><small>Project</small><div id="sp" style="font-size:11px">standby</div></div>
<div class="st"><small>Uptime</small><div id="su">00:00</div></div>
</div>
<div class="cmd">
<input id="inp" placeholder="What should we build?" onkeydown="if(event.key==='Enter')go()">
<button onclick="go()">Execute</button>
</div>
<div class="wf" id="wf"></div>
<div id="log"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
var scene,camera,renderer;
var agents=[
{id:'ceo',n:'CEO',c:0x6c5ce7,h:'#6c5ce7',x:0,z:-3,ry:Math.PI,sk:0xEDCBAB,hr:0x1C1410,sh:0x4840A8,pn:0x22204A,s:'idle',m:{}},
{id:'fe',n:'FE',c:0x14b8a6,h:'#14b8a6',x:-3,z:.5,ry:1.57,sk:0xD4A574,hr:0x5C3317,sh:0x0D9488,pn:0x0A4A44,s:'idle',m:{}},
{id:'be',n:'BE',c:0x3b82f6,h:'#3b82f6',x:-3,z:3,ry:1.57,sk:0xEDCBAB,hr:0x1C1410,sh:0x2563EB,pn:0x1A3050,s:'idle',m:{}},
{id:'pe',n:'PE',c:0xec4899,h:'#ec4899',x:3,z:.5,ry:-1.57,sk:0xE8C4A0,hr:0x2C1A1A,sh:0xDB2777,pn:0x5A1840,s:'idle',m:{}},
{id:'ds',n:'DS',c:0xf59e0b,h:'#f59e0b',x:3,z:3,ry:-1.57,sk:0xEDCBAB,hr:0xC8922A,sh:0xD97706,pn:0x6A4005,s:'idle',m:{}},
{id:'qa',n:'QA',c:0x10b981,h:'#10b981',x:-3,z:5.5,ry:1.57,sk:0xC49A6C,hr:0x1A0E08,sh:0x059669,pn:0x054A34,s:'idle',m:{}},
{id:'dv',n:'DV',c:0x64748b,h:'#64748b',x:3,z:5.5,ry:-1.57,sk:0xD4A574,hr:0x111111,sh:0x475569,pn:0x2A3040,s:'idle',m:{}}
];
var tasks=0,running=false,t0=Date.now();

function init(){
var W=window.innerWidth, H=window.innerHeight;

scene=new THREE.Scene();
scene.background=new THREE.Color(0xD0DCE8);
scene.fog=new THREE.FogExp2(0xD0DCE8,0.015);

camera=new THREE.PerspectiveCamera(40,W/H,0.1,100);
camera.position.set(0,10,14);
camera.lookAt(0,0,1.5);

renderer=new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:true});
renderer.setSize(W,H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.outputEncoding=THREE.sRGBEncoding;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.2;

var amb=new THREE.AmbientLight(0xffffff,0.4);
scene.add(amb);

var sun=new THREE.DirectionalLight(0xFFF8E0,0.9);
sun.position.set(6,12,4);
sun.castShadow=true;
sun.shadow.mapSize.width=2048;
sun.shadow.mapSize.height=2048;
sun.shadow.camera.near=0.5;
sun.shadow.camera.far=40;
sun.shadow.camera.left=-12;
sun.shadow.camera.right=12;
sun.shadow.camera.top=12;
sun.shadow.camera.bottom=-12;
sun.shadow.bias=-0.0005;
scene.add(sun);

var fill=new THREE.DirectionalLight(0xC0D8FF,0.3);
fill.position.set(-6,8,-4);
scene.add(fill);

scene.add(new THREE.HemisphereLight(0x88BBDD,0xC0B8A0,0.3));

for(var i=0;i<4;i++){
var pl=new THREE.PointLight(0xFFF8E0,0.15,8);
pl.position.set(-4+i*2.5,3.5,i%2*3);
scene.add(pl);
}

buildRoom();

for(var i=0;i<agents.length;i++){
buildDesk(agents[i]);
buildPerson(agents[i]);
}

buildDecor();
buildAgentPills();

window.addEventListener('resize',function(){
camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});

animate();
}

function M(c,r,m){return new THREE.MeshStandardMaterial({color:c,roughness:r===undefined?0.7:r,metalness:m===undefined?0.02:m})}
function BX(w,h,d,c,r,m){var mesh=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),M(c,r,m));mesh.castShadow=true;mesh.receiveShadow=true;return mesh}
function CY(t,b,h,c,s){var mesh=new THREE.Mesh(new THREE.CylinderGeometry(t,b,h,s||16),M(c));mesh.castShadow=true;return mesh}
function SP(r,c){var mesh=new THREE.Mesh(new THREE.SphereGeometry(r,16,16),M(c,0.5));mesh.castShadow=true;return mesh}

function buildRoom(){
var floorMat=new THREE.MeshStandardMaterial({color:0xC0B8A8,roughness:0.35,metalness:0.03});
var floor=new THREE.Mesh(new THREE.PlaneGeometry(24,22),floorMat);
floor.rotation.x=-Math.PI/2;
floor.position.set(0,0,1.5);
floor.receiveShadow=true;
scene.add(floor);

for(var z=0;z<22;z++){
for(var x=0;x<24;x++){
if((x+z)%2===0){
var tile=new THREE.Mesh(new THREE.PlaneGeometry(0.98,0.98),new THREE.MeshStandardMaterial({color:0xB5ADA0,roughness:0.3}));
tile.rotation.x=-Math.PI/2;
tile.position.set(x-12,0.003,z-9);
tile.receiveShadow=true;
scene.add(tile);
}
}
}

var wallMat=M(0xF0ECE4,0.85);
var wallBack=new THREE.Mesh(new THREE.PlaneGeometry(24,5),wallMat);
wallBack.position.set(0,2.5,-7);scene.add(wallBack);

var wallL=new THREE.Mesh(new THREE.PlaneGeometry(22,5),wallMat);
wallL.rotation.y=Math.PI/2;wallL.position.set(-12,2.5,0);scene.add(wallL);

var wallR=new THREE.Mesh(new THREE.PlaneGeometry(22,5),wallMat);
wallR.rotation.y=-Math.PI/2;wallR.position.set(12,2.5,0);scene.add(wallR);

var ceilMat=M(0xF5F0E8,0.9);
var ceil=new THREE.Mesh(new THREE.PlaneGeometry(24,22),ceilMat);
ceil.rotation.x=Math.PI/2;ceil.position.set(0,5,0);scene.add(ceil);

for(var i=0;i<4;i++){
var wx=-6+i*4;
var skyMat=new THREE.MeshBasicMaterial({color:0x88CCEE});
var sky=new THREE.Mesh(new THREE.PlaneGeometry(2.2,2.2),skyMat);
sky.position.set(wx,2.5,-6.99);scene.add(sky);

var glassMat=new THREE.MeshStandardMaterial({color:0xAADDFF,roughness:0.05,metalness:0.1,transparent:true,opacity:0.2});
var glass=new THREE.Mesh(new THREE.PlaneGeometry(2.2,2.2),glassMat);
glass.position.set(wx,2.5,-6.98);scene.add(glass);

var frameParts=[
{w:2.4,h:0.06,x:0,y:1.1},{w:2.4,h:0.06,x:0,y:-1.1},
{w:0.06,h:2.3,x:-1.1,y:0},{w:0.06,h:2.3,x:1.1,y:0},
{w:0.04,h:2.2,x:0,y:0},{w:2.2,h:0.04,x:0,y:0}
];
for(var f=0;f<frameParts.length;f++){
var fp=frameParts[f];
var fr=BX(fp.w,fp.h,0.06,0xC0B8A8,0.5,0.05);
fr.position.set(wx+fp.x,2.5+fp.y,-6.96);
scene.add(fr);
}

var sill=BX(2.5,0.06,0.25,0xD8D0C4,0.5);
sill.position.set(wx,1.35,-6.9);scene.add(sill);
}

var mold=BX(24,0.1,0.1,0xD0C8BC,0.6);
mold.position.set(0,0.05,-6.94);scene.add(mold);

for(var i=0;i<5;i++){
var lx=-5+i*2.5;
var lBase=BX(0.9,0.04,0.2,0xE8E8E8,0.3,0.1);
lBase.position.set(lx,4.96,i*0.3);scene.add(lBase);
var lTube=BX(0.65,0.025,0.1,0xFFFDE0,0.2,0);
lTube.position.set(lx,4.94,i*0.3);
lTube.material.emissive=new THREE.Color(0xFFFAD0);
lTube.material.emissiveIntensity=0.4;
scene.add(lTube);
}
}

function buildDesk(a){
var g=new THREE.Group();

var top=BX(2,0.07,1,0xC8A870,0.45);top.position.y=0.76;g.add(top);
var edge=BX(2.02,0.02,1.02,0xDBB888,0.35);edge.position.y=0.785;g.add(edge);

var legs=[[-.95,.45],[.95,.45],[-.95,-.45],[.95,-.45]];
for(var i=0;i<4;i++){
var leg=BX(0.06,0.76,0.06,0x8A6A38,0.6);
leg.position.set(legs[i][0],0.38,legs[i][1]);g.add(leg);
}

var panel=BX(1.9,0.5,0.04,0xB09860,0.55);
panel.position.set(0,0.52,-0.48);g.add(panel);

var monG=new THREE.Group();
var stand=BX(0.04,0.22,0.04,0x444444,0.3,0.3);stand.position.y=0.11;monG.add(stand);
var base=BX(0.2,0.02,0.14,0x444444,0.3,0.3);monG.add(base);
var scr=BX(0.58,0.4,0.03,0x111111,0.15,0.1);scr.position.y=0.42;monG.add(scr);

var dispMat=new THREE.MeshBasicMaterial({color:0x0A1525});
var disp=new THREE.Mesh(new THREE.PlaneGeometry(0.54,0.36),dispMat);
disp.position.set(0,0.42,0.017);monG.add(disp);
a.m.screen=disp;

monG.position.set(0,0.8,-0.22);g.add(monG);

var kb=BX(0.26,0.012,0.12,0xE0E0E0,0.3,0.05);
kb.position.set(0,0.8,0.2);g.add(kb);

var mouse=CY(0.022,0.016,0.012,0xDDDDDD,10);
mouse.position.set(0.38,0.81,0.22);mouse.rotation.x=0.1;g.add(mouse);

var fc=[0x4ade80,0x60a5fa,0xfbbf24,0xf87171,0xa78bfa];
for(var i=0;i<4;i++){
var fo=BX(0.1,0.2,0.02,fc[(agents.indexOf(a)+i)%5],0.6);
fo.position.set(-0.72+i*0.04,0.9,-0.2+i*0.015);g.add(fo);
}

if(agents.indexOf(a)%2===0){
var cup=CY(0.03,0.026,0.07,0xFFF8F0,0.4);
cup.position.set(0.6,0.84,0);g.add(cup);
}

g.position.set(a.x,0,a.z);
g.rotation.y=a.ry+Math.PI;
scene.add(g);

var cG=new THREE.Group();
var seat=CY(0.27,0.27,0.06,a.c,12);seat.position.y=0.48;cG.add(seat);
var back=BX(0.46,0.5,0.04,a.c,0.5);back.position.set(0,0.76,-0.14);cG.add(back);
var pole=CY(0.03,0.03,0.22,0x888888);pole.position.y=0.34;cG.add(pole);
for(var i=0;i<5;i++){
var an=i*Math.PI*2/5;
var arm=CY(0.012,0.012,0.2,0x666666);
arm.rotation.z=Math.PI/2;
arm.position.set(Math.cos(an)*0.15,0.12,Math.sin(an)*0.15);cG.add(arm);
var wh=CY(0.025,0.025,0.025,0x333333,8);
wh.position.set(Math.cos(an)*0.22,0.025,Math.sin(an)*0.22);cG.add(wh);
}
cG.position.set(a.x,0,a.z+(a.ry>0?-0.55:0.55));
cG.rotation.y=a.ry;
scene.add(cG);
}

function buildPerson(a){
var g=new THREE.Group();
var body=new THREE.Group();
body.position.y=0.55;g.add(body);

var torso=BX(0.34,0.4,0.22,a.sh,0.55);torso.position.y=0.2;body.add(torso);

var neck=CY(0.05,0.05,0.07,a.sk,12);neck.position.y=0.44;body.add(neck);

var head=SP(0.15,a.sk);head.position.y=0.58;body.add(head);

var hairTop=SP(0.155,a.hr);hairTop.position.y=0.62;hairTop.scale.set(1,0.5,1);body.add(hairTop);
var hairBack=BX(0.28,0.13,0.17,a.hr,0.7);hairBack.position.set(0,0.56,-0.04);body.add(hairBack);

var eyeMat=new THREE.MeshBasicMaterial({color:0x111111});
var eyeL=new THREE.Mesh(new THREE.SphereGeometry(0.02,8,8),eyeMat);eyeL.position.set(-0.05,0.58,0.14);body.add(eyeL);
var eyeR=new THREE.Mesh(new THREE.SphereGeometry(0.02,8,8),eyeMat);eyeR.position.set(0.05,0.58,0.14);body.add(eyeR);

var shineMat=new THREE.MeshBasicMaterial({color:0xffffff});
var shL=new THREE.Mesh(new THREE.SphereGeometry(0.008,6,6),shineMat);shL.position.set(-0.042,0.585,0.155);body.add(shL);
var shR=new THREE.Mesh(new THREE.SphereGeometry(0.008,6,6),shineMat);shR.position.set(0.058,0.585,0.155);body.add(shR);

var cheekMat=new THREE.MeshStandardMaterial({color:0xE8A8A0,transparent:true,opacity:0.18});
var chL=new THREE.Mesh(new THREE.SphereGeometry(0.03,8,8),cheekMat);chL.position.set(-0.1,0.54,0.11);body.add(chL);
var chR=new THREE.Mesh(new THREE.SphereGeometry(0.03,8,8),cheekMat);chR.position.set(0.1,0.54,0.11);body.add(chR);

var smileMat=M(0xC08878,0.5);
var smile=new THREE.Mesh(new THREE.TorusGeometry(0.04,0.007,8,12,Math.PI),smileMat);
smile.position.set(0,0.5,0.145);smile.rotation.x=Math.PI;body.add(smile);

var armLG=new THREE.Group();armLG.position.set(-0.2,0.34,0);body.add(armLG);
var upArmL=BX(0.1,0.24,0.1,a.sh,0.55);upArmL.position.y=-0.12;armLG.add(upArmL);
var foreArmLG=new THREE.Group();foreArmLG.position.y=-0.24;armLG.add(foreArmLG);
var foreArmL=BX(0.08,0.22,0.08,a.sk,0.45);foreArmL.position.y=-0.11;foreArmLG.add(foreArmL);
var handL=SP(0.038,a.sk);handL.position.y=-0.22;foreArmLG.add(handL);

var armRG=new THREE.Group();armRG.position.set(0.2,0.34,0);body.add(armRG);
var upArmR=BX(0.1,0.24,0.1,a.sh,0.55);upArmR.position.y=-0.12;armRG.add(upArmR);
var foreArmRG=new THREE.Group();foreArmRG.position.y=-0.24;armRG.add(foreArmRG);
var foreArmR=BX(0.08,0.22,0.08,a.sk,0.45);foreArmR.position.y=-0.11;foreArmRG.add(foreArmR);
var handR=SP(0.038,a.sk);handR.position.y=-0.22;foreArmRG.add(handR);

var legL=BX(0.12,0.36,0.12,a.pn,0.55);legL.position.set(-0.09,-0.18,0.13);body.add(legL);
var legR=BX(0.12,0.36,0.12,a.pn,0.55);legR.position.set(0.09,-0.18,0.13);body.add(legR);

var shoeL=BX(0.1,0.05,0.16,0x181818,0.4);shoeL.position.set(-0.09,-0.38,0.15);body.add(shoeL);
var shoeR=BX(0.1,0.05,0.16,0x181818,0.4);shoeR.position.set(0.09,-0.38,0.15);body.add(shoeR);

g.position.set(a.x,0,a.z);
g.rotation.y=a.ry;
scene.add(g);

a.m.group=g;
a.m.body=body;
a.m.head=head;
a.m.armLG=armLG;
a.m.foreArmLG=foreArmLG;
a.m.armRG=armRG;
a.m.foreArmRG=foreArmRG;
}

function buildDecor(){
function makePlant(x,z,s){
var g=new THREE.Group();
var pot=CY(0.12*s,0.1*s,0.18*s,0xA05728);pot.position.y=0.09*s;g.add(pot);
for(var i=0;i<6;i++){
var leaf=SP(0.08*s,i%2?0x22c55e:0x16a34a);
leaf.scale.set(0.5,1.2,0.4);
leaf.position.set(Math.cos(i*1.0)*0.06*s,0.28*s+i*0.03*s,Math.sin(i*1.0)*0.06*s);
leaf.rotation.z=i*0.35-0.8;
g.add(leaf);
}
g.position.set(x,0,z);scene.add(g);
}
makePlant(-10,0,1.3);makePlant(10,-1,1.1);makePlant(-10,5.5,1);makePlant(10,5.5,1.2);makePlant(0,-5,0.8);

function makePart(x,z,w){
var p=BX(w,0.9,0.05,0xBCC4D4,0.45);p.position.set(x,0.88,z);p.receiveShadow=true;scene.add(p);
var t=BX(w+0.05,0.04,0.06,0xA8B0C0,0.4,0.05);t.position.set(x,1.34,z);scene.add(t);
}
makePart(0,1.6,3);makePart(0,4.2,3);
makePart(-5.5,1.6,1.2);makePart(-5.5,4.2,1.2);
makePart(5.5,1.6,1.2);makePart(5.5,4.2,1.2);

var wb=BX(2.5,1.5,0.04,0xFFFFFF,0.3);wb.position.set(5,2.5,-6.95);scene.add(wb);
for(var i=0;i<4;i++){
var note=BX(0.2,0.14,0.005,[0xFEE2A7,0x81ECEC,0xA29BFE,0xFD79A8][i]);
note.position.set(4.3+i*0.35,2.6+Math.sin(i)*0.12,-6.93);scene.add(note);
}

var wcBody=BX(0.28,0.65,0.28,0xE8E8E8,0.3,0.05);wcBody.position.set(10,0.325,-4);scene.add(wcBody);
var wcBot=CY(0.1,0.1,0.3,0xB8D8F0,16);wcBot.material.transparent=true;wcBot.material.opacity=0.6;
wcBot.position.set(10,0.82,-4);scene.add(wcBot);
}

function animateAgent(a,t){
var m=a.m;if(!m.body)return;
var br=Math.sin(t*0.7+agents.indexOf(a)*1.3)*0.008;
m.body.position.y=0.55+br;

var typing=a.s==='typing';
var thinking=a.s==='thinking';
var presenting=a.s==='presenting';
var celebrating=a.s==='celebrating';

if(typing){
m.armLG.rotation.x=-0.55+Math.sin(t*5.5)*0.1;
m.armRG.rotation.x=-0.55+Math.sin(t*5.5+1.5)*0.1;
m.foreArmLG.rotation.x=-1.05+Math.sin(t*7.5)*0.06;
m.foreArmRG.rotation.x=-1.05+Math.sin(t*7.5+1)*0.06;
m.head.rotation.y=Math.sin(t*0.35)*0.03;
if(m.screen)m.screen.material.color.setHex(0x1a3a6a);
}else if(thinking){
m.armRG.rotation.x=-1.15;m.armRG.rotation.z=0.25;
m.foreArmRG.rotation.x=-1.4;
m.armLG.rotation.x=-0.12;m.armLG.rotation.z=0;
m.foreArmLG.rotation.x=-0.25;
m.head.rotation.z=Math.sin(t)*0.05;m.head.rotation.x=-0.06;
}else if(presenting){
m.armRG.rotation.x=-2+Math.sin(t*2)*0.12;m.armRG.rotation.z=0.12;
m.foreArmRG.rotation.x=-0.2;
m.armLG.rotation.x=-0.08;m.armLG.rotation.z=0;
m.foreArmLG.rotation.x=-0.15;
m.head.rotation.y=Math.sin(t*1.2)*0.05;m.head.rotation.z=0;m.head.rotation.x=0;
}else if(celebrating){
m.armLG.rotation.x=-2.4+Math.sin(t*6)*0.2;
m.armRG.rotation.x=-2.4+Math.sin(t*6+1)*0.2;
m.armLG.rotation.z=0;m.armRG.rotation.z=0;
m.foreArmLG.rotation.x=-0.1;m.foreArmRG.rotation.x=-0.1;
m.head.rotation.z=Math.sin(t*4)*0.06;m.head.rotation.x=0;m.head.rotation.y=Math.sin(t*3)*0.04;
}else{
m.armLG.rotation.set(-0.15,0,0);
m.armRG.rotation.set(-0.15,0,0);
m.foreArmLG.rotation.x=-0.45;
m.foreArmRG.rotation.x=-0.45;
m.head.rotation.set(0,0,0);
if(m.screen)m.screen.material.color.setHex(0x080e1a);
}
}

function animate(){
requestAnimationFrame(animate);
var t=performance.now()*0.001;

camera.position.x=Math.sin(t*0.06)*0.6;
camera.position.y=10+Math.sin(t*0.1)*0.2;
camera.position.z=14+Math.sin(t*0.08)*0.2;
camera.lookAt(0,0.5,1.5);

for(var i=0;i<agents.length;i++){
animateAgent(agents[i],t);
}

renderer.render(scene,camera);
}

function buildAgentPills(){
var c=document.getElementById('ags');
for(var i=0;i<agents.length;i++){
var a=agents[i];
var el=document.createElement('span');
el.id='ag-'+a.id;
el.textContent=a.n;
el.style.color=a.h;
c.appendChild(el);
}
}

function updateUI(a){
var el=document.getElementById('ag-'+a.id);
if(el)el.className=a.s!=='idle'?'on':'';
}

function addLog(id,msg){
var a=null;
for(var i=0;i<agents.length;i++){if(agents[i].id===id){a=agents[i];break}}
if(!a)a={n:'SYS',h:'#34d399'};
var el=document.createElement('div');
el.innerHTML='<b style="color:'+a.h+'">'+a.n+'</b> '+msg;
var c=document.getElementById('log');
c.insertBefore(el,c.firstChild);
if(c.children.length>5)c.removeChild(c.lastChild);
}

function updateWF(steps,idx){
var b=document.getElementById('wf');b.innerHTML='';
for(var i=0;i<steps.length;i++){
if(i>0)b.innerHTML+='<span class="ar"> &rarr; </span>';
var a=null;for(var j=0;j<agents.length;j++){if(agents[j].id===steps[i].a)a=agents[j]}
var cls=i<idx?'done':i===idx?'now':'wait';
b.innerHTML+='<span class="'+cls+'">'+(a?a.n:'?')+'</span>';
}
}

var SCEN={
drslot:[{a:'ceo',s:'thinking',d:1500},{a:'ceo',s:'presenting',d:1000},{a:'ds',s:'typing',d:2400},{a:'be',s:'typing',d:2800},{a:'fe',s:'typing',d:2800},{a:'qa',s:'typing',d:2000},{a:'dv',s:'typing',d:1600},{a:'ceo',s:'celebrating',d:1500}],
jarvis2:[{a:'ceo',s:'thinking',d:1500},{a:'pe',s:'typing',d:2800},{a:'be',s:'typing',d:2800},{a:'qa',s:'typing',d:2200},{a:'dv',s:'typing',d:1600},{a:'ceo',s:'celebrating',d:1500}],
community:[{a:'ceo',s:'thinking',d:1500},{a:'ds',s:'typing',d:2600},{a:'fe',s:'typing',d:2800},{a:'qa',s:'typing',d:1800},{a:'ceo',s:'celebrating',d:1500}]
};

function go(){
if(running)return;running=true;
var text=document.getElementById('inp').value.trim()||'new feature';
document.getElementById('inp').value='';
var proj='drslot';
if(text.match(/jarvis|자비스|텔레|프롬프트|crm|영업/i))proj='jarvis2';
else if(text.match(/커뮤|community|비교/i))proj='community';
var names={drslot:'DR.SLOT',jarvis2:'JARVIS2',community:'Community'};
document.getElementById('sp').textContent=names[proj];
addLog('ceo','"'+text+'"');

var steps=SCEN[proj];
var idx=0;
var prev=null;

function next(){
if(idx>=steps.length){
tasks++;document.getElementById('stk').textContent=tasks;
updateWF(steps,steps.length);
addLog('ceo','#'+tasks+' done!');
setTimeout(function(){
for(var i=0;i<agents.length;i++){agents[i].s='idle';updateUI(agents[i])}
document.getElementById('wf').innerHTML='';
document.getElementById('sp').textContent='standby';
document.getElementById('sa').textContent='0/7';
running=false;
},2000);
return;
}

var step=steps[idx];
updateWF(steps,idx);

if(prev&&prev!==step.a){
for(var i=0;i<agents.length;i++){
if(agents[i].id===prev){agents[i].s='idle';updateUI(agents[i])}
}
}

for(var i=0;i<agents.length;i++){
if(agents[i].id===step.a){agents[i].s=step.s;updateUI(agents[i])}
}

var ac=0;
for(var i=0;i<agents.length;i++){if(agents[i].s!=='idle')ac++}
document.getElementById('sa').textContent=ac+'/7';

var a=null;for(var i=0;i<agents.length;i++){if(agents[i].id===step.a)a=agents[i]}
addLog(step.a,(a?a.n:'')+' '+step.s);

prev=step.a;
idx++;
setTimeout(next,step.d);
}

next();
}

window.addEventListener('load',function(){
init();
addLog('ceo','Office open!');
});

var e=Math.floor((Date.now()-t0)/1000);
document.getElementById('su').textContent=String(Math.floor(e/60)).padStart(2,'0')+':'+String(e%60).padStart(2,'0');
},1000);
</script>
