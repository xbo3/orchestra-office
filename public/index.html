<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>WOO ORCHESTRA OFFICE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:system-ui,sans-serif;color:#fff}
canvas{display:block;position:fixed;top:0;left:0}
#loading{position:fixed;inset:0;background:#0a0a12;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;transition:opacity .8s}
#loading.hide{opacity:0;pointer-events:none}
#loading h2{font-size:16px;font-weight:600;margin-bottom:12px;color:rgba(255,255,255,.7)}
#loading .bar{width:200px;height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
#loading .fill{height:100%;background:#6c5ce7;border-radius:2px;width:0%;transition:width .3s}
#hud{position:fixed;bottom:0;left:0;right:0;z-index:10;padding:12px 16px;background:rgba(0,0,0,.55);backdrop-filter:blur(16px);border-top:1px solid rgba(255,255,255,.06)}
#top{position:fixed;top:0;left:0;right:0;z-index:10;padding:8px 16px;background:rgba(0,0,0,.45);backdrop-filter:blur(16px);display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.05)}
#top h1{font-size:13px;font-weight:700}
.row{display:flex;gap:6px;margin-bottom:8px}
.st{flex:1;padding:6px 8px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.04);border-radius:6px}
.st small{font-size:7px;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:.5px}
.st div{font-size:14px;font-weight:700;font-family:monospace}
.cmd{display:flex;gap:6px}
.cmd input{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);border-radius:6px;padding:6px 10px;color:#fff;font-size:11px;outline:none}
.cmd input:focus{border-color:#6c5ce7}
.cmd input::placeholder{color:rgba(255,255,255,.15)}
.cmd button{background:#6c5ce7;color:#fff;border:none;border-radius:6px;padding:6px 16px;font-size:11px;font-weight:600;cursor:pointer}
.wf{display:flex;gap:3px;flex-wrap:wrap;min-height:18px;margin-top:6px}
.wf span{padding:2px 8px;border-radius:4px;font-size:8px;font-weight:600}
.wf .done{background:rgba(52,211,153,.12);color:#34d399}
.wf .now{background:rgba(108,92,231,.15);color:#a29bfe;box-shadow:0 0 8px rgba(108,92,231,.15)}
.wf .wait{opacity:.12;background:rgba(255,255,255,.03);color:#888}
.wf .ar{color:#333;font-size:9px}
.ags{display:flex;gap:4px;flex-wrap:wrap}
.ags span{font-size:8px;padding:2px 7px;border-radius:8px;font-weight:600;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.04);cursor:pointer;transition:.15s}
.ags span.on{background:rgba(108,92,231,.12);border-color:rgba(108,92,231,.25)}
.pill{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:10px;font-size:8px;font-weight:600;background:rgba(52,211,153,.1);color:#34d399}
.pill i{width:4px;height:4px;border-radius:50%;background:currentColor;animation:p 2s infinite;display:inline-block}
@keyframes p{50%{opacity:.2}}
#log{font-size:8px;color:rgba(255,255,255,.3);margin-top:4px;max-height:30px;overflow:hidden}
#log div{margin-bottom:1px}
.hint{position:fixed;top:50px;left:50%;transform:translateX(-50%);font-size:10px;color:rgba(255,255,255,.2);z-index:5;pointer-events:none;transition:opacity 1s}

#tp{position:fixed;right:12px;top:50px;width:260px;z-index:15;pointer-events:auto;display:none}
#tp.show{display:block}
.tpc{background:rgba(10,10,20,.75);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:14px}
.tpt{font-size:10px;font-weight:700;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.tppct{font-size:26px;font-weight:800;font-family:monospace;background:linear-gradient(135deg,#6c5ce7,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tpbw{height:4px;background:rgba(255,255,255,.06);border-radius:2px;margin:6px 0 12px;overflow:hidden}
.tpb{height:100%;border-radius:2px;background:linear-gradient(90deg,#6c5ce7,#34d399);transition:width .4s}
.tps{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.tps:last-child{border-bottom:none}
.tpd{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tpd.d{background:#34d399}
.tpd.a{background:#6c5ce7;box-shadow:0 0 8px rgba(108,92,231,.5);animation:tpp 1s infinite}
.tpd.w{background:rgba(255,255,255,.06)}
@keyframes tpp{50%{box-shadow:0 0 14px rgba(108,92,231,.8)}}
.tpi{flex:1;min-width:0}
.tpn{font-size:9px;font-weight:700}
.tptk{font-size:7px;color:rgba(255,255,255,.3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tpst{font-size:7px;font-weight:600;flex-shrink:0}
.tpst.d{color:#34d399}
.tpst.a{color:#a29bfe}
.tpst.w{color:rgba(255,255,255,.12)}
.tpel{font-size:8px;color:rgba(255,255,255,.15);font-family:monospace;text-align:right;margin-top:6px}

#wb{position:fixed;left:12px;top:50px;width:300px;z-index:15;pointer-events:auto;max-height:calc(100vh - 120px);overflow-y:auto}
#wb::-webkit-scrollbar{width:3px}
#wb::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.wbc{background:rgba(15,18,28,.8);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:14px;margin-bottom:8px}
.wbt{font-size:11px;font-weight:700;color:rgba(255,255,255,.6);margin-bottom:10px}
.wbl{font-size:8px;font-weight:600;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.wbk{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.wbki{padding:8px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.03);border-radius:8px;text-align:center}
.wbki .v{font-size:18px;font-weight:800;font-family:monospace}
.wbki .l{font-size:7px;color:rgba(255,255,255,.2);text-transform:uppercase;margin-top:2px}
.wba{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:6px;margin-bottom:3px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.03);transition:.3s}
.wba.on{background:rgba(108,92,231,.08);border-color:rgba(108,92,231,.15)}
.wba .d{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.wba .d.idle{background:rgba(255,255,255,.04)}
.wba .d.work{background:#6c5ce7;animation:wbpp 1s infinite}
.wba .d.done{background:#34d399}
.wba .d.wait{background:rgba(255,255,255,.06)}
@keyframes wbpp{50%{box-shadow:0 0 10px rgba(108,92,231,.6)}}
.wba .i{flex:1;min-width:0}
.wba .n{font-size:9px;font-weight:700}
.wba .t{font-size:7px;color:rgba(255,255,255,.25);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wba .s{font-size:7px;font-weight:600;flex-shrink:0}
.wba .s.work{color:#a29bfe}
.wba .s.done{color:#34d399}
.wba .s.wait{color:rgba(255,255,255,.1)}
.wbpb{height:4px;background:rgba(255,255,255,.04);border-radius:2px;overflow:hidden;margin:6px 0}
.wbpf{height:100%;border-radius:2px;background:linear-gradient(90deg,#6c5ce7,#34d399);transition:width .4s}
.wbh{max-height:80px;overflow-y:auto}
.wbh::-webkit-scrollbar{width:2px}
.wbh::-webkit-scrollbar-thumb{background:rgba(255,255,255,.05)}
.wbhi{display:flex;gap:5px;padding:2px 0;font-size:7px;border-bottom:1px solid rgba(255,255,255,.02)}
.wbhi .ht{color:rgba(255,255,255,.12);font-family:monospace;min-width:26px}
.wbhi .hm{color:rgba(255,255,255,.25);flex:1}
</style>
</head>
<body>
<div id="loading"><h2>사무실 로딩 중...</h2><div class="bar"><div class="fill" id="prog"></div></div></div>
<canvas id="c"></canvas>
<div class="hint" id="hint">드래그: 회전 / 스크롤: 줌</div>
<div id="top">
<div style="display:flex;align-items:center;gap:8px"><h1>WOO ORCHESTRA OFFICE</h1></div>
<div style="display:flex;align-items:center;gap:8px"><div class="ags" id="ags"></div><span class="pill"><i></i>Live</span></div>
</div>
<div id="wb">
<div class="wbc">
<div class="wbt">📋 화이트보드 — 업무 현황판</div>
<div class="wbl">📊 성과 지표</div>
<div class="wbk">
<div class="wbki"><div class="v" id="wkT" style="color:#34d399">0</div><div class="l">완료 태스크</div></div>
<div class="wbki"><div class="v" id="wkR" style="color:#a29bfe">—</div><div class="l">평균 시간</div></div>
<div class="wbki"><div class="v" id="wkA" style="color:#fbbf24">0</div><div class="l">활동중</div></div>
<div class="wbki"><div class="v" id="wkP" style="color:#60a5fa">—</div><div class="l">프로젝트</div></div>
</div>
<div class="wbl">🚀 현재 작업</div>
<div id="wkC" style="font-size:9px;color:rgba(255,255,255,.15);padding:6px">대기 중...</div>
<div class="wbl" style="margin-top:8px">👥 에이전트</div>
<div id="wkAg"></div>
<div class="wbl" style="margin-top:8px">📝 이력</div>
<div class="wbh" id="wkH"></div>
</div>
</div>
<div id="tp"><div class="tpc"><div class="tpt">작업 진행 상황</div><div><div class="tppct" id="tppct">0%</div><div style="font-size:8px;color:rgba(255,255,255,.2)" id="tplbl">Waiting...</div><div class="tpbw"><div class="tpb" id="tpbar"></div></div></div><div id="tpsteps"></div><div class="tpel" id="tpel">00:00</div></div></div>
<div id="hud">
<div class="row">
<div class="st"><small>에이전트</small><div id="sa">0/7</div></div>
<div class="st"><small>완료 태스크</small><div id="stk">0</div></div>
<div class="st"><small>프로젝트</small><div id="sp" style="font-size:11px">대기</div></div>
<div class="st"><small>가동시간</small><div id="su" style="font-family:monospace">00:00</div></div>
</div>
<div class="cmd">
<input id="inp" placeholder="무엇을 만들까요?" onkeydown="if(event.key==='Enter')go()">
<button onclick="go()">실행</button>
</div>
<div class="wf" id="wf"></div>
<div id="log"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/utils/SkeletonUtils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
var scene,camera,renderer,controls,clock;
var AGENTS=[
{id:'ceo',n:'CEO 팀장',c:0x6c5ce7,h:'#6c5ce7',x:0,z:-2.5,ry:0,s:'idle'},
{id:'fe',n:'프론트',c:0x14b8a6,h:'#14b8a6',x:-2.8,z:0.5,ry:Math.PI/2,s:'idle'},
{id:'be',n:'백엔드',c:0x3b82f6,h:'#3b82f6',x:-2.8,z:3,ry:Math.PI/2,s:'idle'},
{id:'pe',n:'프롬프트',c:0xec4899,h:'#ec4899',x:2.8,z:0.5,ry:-Math.PI/2,s:'idle'},
{id:'ds',n:'디자이너',c:0xf59e0b,h:'#f59e0b',x:2.8,z:3,ry:-Math.PI/2,s:'idle'},
{id:'qa',n:'테스터',c:0x10b981,h:'#10b981',x:-2.8,z:5.5,ry:Math.PI/2,s:'idle'},
{id:'dv',n:'배포담당',c:0x64748b,h:'#64748b',x:2.8,z:5.5,ry:-Math.PI/2,s:'idle'}
];
var tasks=0,running=false,t0=Date.now();
var ANIM_MAP={idle:'Idle',typing:'Idle',thinking:'Yes',presenting:'Wave',celebrating:'Dance'};

function prog(pct){document.getElementById('prog').style.width=pct+'%'}

function init(){
clock=new THREE.Clock();
var W=innerWidth,H=innerHeight;

scene=new THREE.Scene();
scene.background=new THREE.Color(0xC8D4E4);
scene.fog=new THREE.FogExp2(0xC8D4E4,0.012);

camera=new THREE.PerspectiveCamera(45,W/H,0.1,100);
camera.position.set(6,8,12);
camera.lookAt(0,1,1.5);

renderer=new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:true});
renderer.setSize(W,H);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.outputEncoding=THREE.sRGBEncoding;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.2;
prog(10);

controls=new THREE.OrbitControls(camera,renderer.domElement);
controls.target.set(0,1,1.5);
controls.enableDamping=true;
controls.dampingFactor=0.05;
controls.maxPolarAngle=Math.PI/2.1;
controls.minDistance=5;
controls.maxDistance=25;
controls.update();

scene.add(new THREE.AmbientLight(0xFFFFFF,0.45));

var sun=new THREE.DirectionalLight(0xFFF8E0,0.9);
sun.position.set(6,14,4);sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.near=0.5;sun.shadow.camera.far=40;
sun.shadow.camera.left=-14;sun.shadow.camera.right=14;
sun.shadow.camera.top=14;sun.shadow.camera.bottom=-14;
sun.shadow.bias=-0.0004;sun.shadow.normalBias=0.02;
scene.add(sun);

scene.add(new THREE.DirectionalLight(0xC0D8FF,0.3).position.set(-6,8,-4)&&scene.children[scene.children.length-1]||new THREE.Object3D());
var fill=new THREE.DirectionalLight(0xC0D8FF,0.3);fill.position.set(-6,8,-4);scene.add(fill);

scene.add(new THREE.HemisphereLight(0x88BBDD,0xC0B8A0,0.3));

for(var i=0;i<5;i++){
var pl=new THREE.PointLight(0xFFF8E0,0.12,10);
pl.position.set(-4+i*2.2,4,i%2*3-0.5);scene.add(pl);
}
prog(20);

buildRoom();
prog(40);

AGENTS.forEach(function(a){buildDesk(a)});
prog(60);

buildDecor();
prog(70);

loadRobots();

window.onresize=function(){
camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
};

setTimeout(function(){document.getElementById('hint').style.opacity='0'},5000);
animate();
}

function M(c,r,m){return new THREE.MeshStandardMaterial({color:c,roughness:r===undefined?0.7:r,metalness:m===undefined?0.02:m})}
function BX(w,h,d,c,r,m){var mesh=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),M(c,r,m));mesh.castShadow=true;mesh.receiveShadow=true;return mesh}
function CY(t,b,h,c,s){var mesh=new THREE.Mesh(new THREE.CylinderGeometry(t,b,h,s||16),M(c));mesh.castShadow=true;return mesh}
function SP(r,c){var mesh=new THREE.Mesh(new THREE.SphereGeometry(r,16,16),M(c,0.5));mesh.castShadow=true;return mesh}

function buildRoom(){
var floorMat=new THREE.MeshStandardMaterial({color:0xBEB8A8,roughness:0.25,metalness:0.03,envMapIntensity:0.5});
var floor=new THREE.Mesh(new THREE.PlaneGeometry(26,22),floorMat);
floor.rotation.x=-Math.PI/2;floor.position.set(0,0,1.5);floor.receiveShadow=true;scene.add(floor);

for(var z=0;z<22;z++)for(var x=0;x<26;x++){
if((x+z)%2===0){
var t=new THREE.Mesh(new THREE.PlaneGeometry(0.98,0.98),new THREE.MeshStandardMaterial({color:0xB3ADA0,roughness:0.2,metalness:0.01}));
t.rotation.x=-Math.PI/2;t.position.set(x-13,0.003,z-9);t.receiveShadow=true;scene.add(t);
}}

var wm=M(0xF0ECE4,0.85);
var wb=new THREE.Mesh(new THREE.PlaneGeometry(26,5),wm);wb.position.set(0,2.5,-7);scene.add(wb);
var wl=new THREE.Mesh(new THREE.PlaneGeometry(22,5),wm);wl.rotation.y=Math.PI/2;wl.position.set(-13,2.5,0);scene.add(wl);
var wr=new THREE.Mesh(new THREE.PlaneGeometry(22,5),wm);wr.rotation.y=-Math.PI/2;wr.position.set(13,2.5,0);scene.add(wr);
var cm=new THREE.Mesh(new THREE.PlaneGeometry(26,22),M(0xF4F0E8,0.9));cm.rotation.x=Math.PI/2;cm.position.set(0,5,0);scene.add(cm);

for(var i=0;i<4;i++){
var wx=-6+i*4;
var sky=new THREE.Mesh(new THREE.PlaneGeometry(2.4,2.4),new THREE.MeshBasicMaterial({color:0x88CCEE}));
sky.position.set(wx,2.6,-6.99);scene.add(sky);
var glass=new THREE.Mesh(new THREE.PlaneGeometry(2.4,2.4),new THREE.MeshStandardMaterial({color:0xAADDFF,roughness:0.05,metalness:0.15,transparent:true,opacity:0.15}));
glass.position.set(wx,2.6,-6.98);scene.add(glass);
var parts=[[0,1.2,2.6,0.06],[0,-1.2,2.6,0.06],[-1.2,0,0.06,2.5],[1.2,0,0.06,2.5],[0,0,0.04,2.4],[0,0,2.4,0.04]];
for(var f=0;f<parts.length;f++){
var p=parts[f];
var fr=BX(p[2],p[3],0.07,0xC0B8A8,0.5,0.05);
fr.position.set(wx+p[0],2.6+p[1],-6.96);scene.add(fr);
}
var sill=BX(2.6,0.06,0.28,0xD8D0C4,0.5);sill.position.set(wx,1.35,-6.9);scene.add(sill);
}

for(var i=0;i<5;i++){
var lx=-5+i*2.5;
var lb=BX(0.9,0.04,0.22,0xE8E8E8,0.3,0.1);lb.position.set(lx,4.96,i*0.3);scene.add(lb);
var lt=BX(0.65,0.025,0.1,0xFFFDE0,0.2,0);lt.position.set(lx,4.94,i*0.3);
lt.material.emissive=new THREE.Color(0xFFFAD0);lt.material.emissiveIntensity=0.35;scene.add(lt);
}

var mol=BX(26,0.1,0.1,0xD0C8BC,0.6);mol.position.set(0,0.05,-6.94);scene.add(mol);
}

function buildDesk(a){
var g=new THREE.Group();
var top=BX(2.2,0.08,1.1,0xC8A870,0.4,0.03);top.position.y=0.76;g.add(top);
var edge=BX(2.22,0.025,1.12,0xDBB888,0.3,0.02);edge.position.y=0.785;g.add(edge);
var legs=[[-.95,.45],[.95,.45],[-.95,-.45],[.95,-.45]];
for(var i=0;i<4;i++){var l=BX(.06,.76,.06,0x8A6A38,.6);l.position.set(legs[i][0],.38,legs[i][1]);g.add(l)}
var pn=BX(1.9,.5,.04,0xB09860,.55);pn.position.set(0,.52,-.48);g.add(pn);

var mg=new THREE.Group();
var lBase=BX(.45,.02,.3,0x333333,.3,.15);lBase.position.y=.01;mg.add(lBase);
var lKey=BX(.4,.005,.25,0x222222,.35,.1);lKey.position.y=.02;lKey.position.z=.01;mg.add(lKey);
for(var kr=0;kr<4;kr++)for(var kc=0;kc<10;kc++){var ky=BX(.028,.004,.02,0x444444,.4,.05);ky.position.set(-.16+kc*.035,.025,-.07+kr*.03);mg.add(ky)}
var tpad=BX(.1,.004,.07,0x3a3a3a,.3,.08);tpad.position.set(0,.025,.09);mg.add(tpad);
var lScreen=new THREE.Group();
var lBack=BX(.44,.3,.015,0x333333,.25,.15);lBack.position.y=.15;lScreen.add(lBack);
var dm=new THREE.MeshBasicMaterial({color:0x0A1525});
var dp=new THREE.Mesh(new THREE.PlaneGeometry(.4,.26),dm);
dp.position.set(0,.15,.009);lScreen.add(dp);
a.screen=dp;
var lLogo=BX(.03,.03,.001,0x555555,.3,.2);lLogo.position.set(0,.15,-.009);lScreen.add(lLogo);
lScreen.position.set(0,.02,-.13);
lScreen.rotation.x=-.25;
mg.add(lScreen);
var lHinge=BX(.3,.015,.015,0x444444,.3,.15);lHinge.position.set(0,.02,-.14);mg.add(lHinge);
mg.position.set(0,.79,.05);g.add(mg);

var kb=BX(.26,.012,.12,0xE0E0E0,.3,.05);kb.position.set(0,.8,.2);g.add(kb);
for(var r=0;r<3;r++)for(var c=0;c<7;c++){
var k=BX(.025,.01,.028,0xCCC,.35,.05);
k.position.set(-.08+c*.028,.81,.16+r*.028);g.add(k)}

function loadRobots(){
var loader=new THREE.GLTFLoader();
loader.load('/models/robot.glb',function(gltf){
prog(90);

var baseAnims=gltf.animations;

baseModel.scale.set(0.55,0.55,0.55);

baseModel.traverse(function(child){
if(child.isMesh){
child.castShadow=true;
child.receiveShadow=true;
}
});

for(var i=0;i<AGENTS.length;i++){
var a=AGENTS[i];
var model;

if(typeof THREE.SkeletonUtils!=='undefined'){
model=THREE.SkeletonUtils.clone(baseModel);
}else{
model=baseModel.clone();
}

model.traverse(function(child){
if(child.isMesh){
child.material=child.material.clone();
var hsl={};child.material.color.getHSL(hsl);
var nc=new THREE.Color(a.c);
var nhsl={};nc.getHSL(nhsl);
child.material.color.setHSL(nhsl.h,Math.min(hsl.s*0.7+nhsl.s*0.3,1),hsl.l*0.8+nhsl.l*0.2);
child.material.metalness=0.15;
child.material.roughness=0.45;
child.castShadow=true;
child.receiveShadow=true;
}
});

model.position.set(a.x,0,a.z);
model.rotation.y=a.ry;
scene.add(model);

var mixer=new THREE.AnimationMixer(model);
a.mixer=mixer;
a.actions={};
a.model=model;

for(var j=0;j<baseAnims.length;j++){
var clip=baseAnims[j];
var action=mixer.clipAction(clip);
a.actions[clip.name]=action;

}

}

prog(100);

},
function(xhr){

},

function fadeToAction(a,name){
var animName=ANIM_MAP[name]||'Idle';
if(a.currentAnim===animName)return;
if(!a.actions[animName])return;
var prev=a.actions[a.currentAnim];
var next=a.actions[animName];
if(prev){prev.fadeOut(0.4)}
next.reset().fadeIn(0.4).play();
a.currentAnim=animName;

if(a.screen){
if(name==='typing'){a.screen.material.color.setHex(0x1a3a6a);a.screen.material.needsUpdate=true;}else{a.screen.material.color.setHex(0x080e1a);}
}
}

function animate(){

var delta=clock.getDelta();
var t=clock.getElapsedTime();

controls.update();

for(var i=0;i<AGENTS.length;i++){

if(a.mixer)a.mixer.update(delta);

if(window._clock3d){
var now=new Date();
var ha=(now.getHours()%12+now.getMinutes()/60)*Math.PI/6;
var ma=now.getMinutes()*Math.PI/30;
window._clock3d.userData.hh.rotation.z=-ha;

window._clock3d.userData.mh.rotation.z=-ma;
window._clock3d.userData.mh.position.set(Math.sin(ma)*0.055,Math.cos(ma)*0.055,0.02);
}

renderer.render(scene,camera);
}

function go(){
if(running)return;running=true;
taskStartTime=Date.now();
var text=document.getElementById('inp').value.trim()||'new feature';
document.getElementById('inp').value='';
var proj='drslot';
if(text.match(/stitch|디자인|목업|UI|레이아웃|mockup|와이어프레임/i))proj='stitch';
if(text.match(/jarvis|자비스|텔레|프롬프트|crm|영업/i))proj='jarvis2';
else if(text.match(/커뮤|community|비교/i))proj='community';
var names={stitch:'Stitch 디자인',drslot:'DR.SLOT',jarvis2:'JARVIS2',community:'Community'};
document.getElementById('sp').textContent=names[proj];
addLog('ceo','"'+text+'"');

var steps=SCEN[proj];
var idx=0;var prev=null;

function next(){
if(idx>=steps.length){
tasks++;document.getElementById('stk').textContent=tasks;
updateWF(steps,steps.length);
addLog('ceo','#'+tasks+' done!');
setTimeout(function(){
for(var i=0;i<AGENTS.length;i++){
AGENTS[i].s='idle';
fadeToAction(AGENTS[i],'idle');
updateUI(AGENTS[i]);
}
document.getElementById('wf').innerHTML='';
document.getElementById('sp').textContent='standby';
document.getElementById('tp').classList.remove('show');
wbR();
document.getElementById('wkT').textContent=tasks;
wbTT.push(Math.round((Date.now()-taskStartTime)/1000));
var avg=Math.round(wbTT.reduce(function(a,b){return a+b},0)/wbTT.length);
document.getElementById('wkR').textContent=avg+'초';
document.getElementById('sa').textContent='0/7';
running=false;
},2500);
return;
}

var step=steps[idx];
updateWF(steps,idx);

if(prev&&prev!==step.a){
for(var i=0;i<AGENTS.length;i++){
if(AGENTS[i].id===prev){
AGENTS[i].s='idle';
fadeToAction(AGENTS[i],'idle');
updateUI(AGENTS[i]);
}
}
}

for(var i=0;i<AGENTS.length;i++){
if(AGENTS[i].id===step.a){
AGENTS[i].s=step.s;
fadeToAction(AGENTS[i],step.s);
updateUI(AGENTS[i]);
}
}

var ac=0;
for(var i=0;i<AGENTS.length;i++){if(AGENTS[i].s!=='idle')ac++}
document.getElementById('sa').textContent=ac+'/7';

var a=null;for(var i=0;i<AGENTS.length;i++){if(AGENTS[i].id===step.a)a=AGENTS[i]}
addLog(step.a,(a?a.n:'')+' '+(step.t||step.s));
upProgress(steps,idx-1);
wbU(steps,idx-1,names[proj]);
wbAH(a||{n:"?",h:"#888"},step.t||step.s);

prev=step.a;idx++;
setTimeout(next,step.d);
}
next();
}
